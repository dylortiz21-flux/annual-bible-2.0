<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annual Bible</title>

<style>
body{
  margin:0;
  background:#0d1117;
  color:white;
  font-family:sans-serif;
}

.header{
  padding:20px;
  background:#161b22;
}

.day{
  margin:10px;
  padding:15px;
  background:#222;
  border-radius:10px;
}

.done{
  background:#0f2d1a;
  color:#56d364;
}
</style>
</head>

<body>

<div class="header">
  <h1>📖 Annual Bible</h1>
  <p id="progress"></p>
</div>

<div id="list"></div>

<script>

// datos
let list=document.getElementById("list");
let done=JSON.parse(localStorage.getItem("done")||"{}");

// progreso
function updateProgress(){
  let total=Object.keys(done).length;
  document.getElementById("progress").innerText=
    total+" de 365 días completados";
}

// crear días
for(let i=1;i<=365;i++){

  let div=document.createElement("div");
  div.className="day"+(done[i]?" done":"");
  div.innerText="Día "+i+" - Leer en JW.org";

  div.onclick=()=>{
    window.open("https://www.jw.org/es/biblioteca/biblia/","_blank");

    done[i]=!done[i];
    localStorage.setItem("done",JSON.stringify(done));
    location.reload();
  };

  list.appendChild(div);
}

updateProgress();

</script>

</body>
</html>
