<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Biblia en un Año — Dy</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Biblia 365"/>
<meta name="theme-color" content="#0d1117"/>
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Biblia%20en%20un%20A%C3%B1o%22%2C%22short_name%22%3A%22Biblia%20365%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230d1117%22%2C%22theme_color%22%3A%22%230d1117%22%7D"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#0d1117;color:#e6edf3;font-family:'Georgia',serif;min-height:100vh;overflow-x:hidden;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#30363d;border-radius:99px;}

  /* Header */
  .header{background:linear-gradient(135deg,#1a2744 0%,#0d1117 100%);border-bottom:1px solid #30363d;padding:20px 20px 16px;position:sticky;top:0;z-index:100;}
  .header h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;margin-bottom:3px;}
  .header p{font-size:12px;color:#8b949e;}
  .progress-bar-wrap{margin-top:12px;}
  .progress-info{display:flex;justify-content:space-between;font-size:11px;color:#8b949e;margin-bottom:5px;}
  .progress-track{height:6px;background:#21262d;border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,#2ea043,#56d364);border-radius:99px;transition:width .4s ease;}

  /* Nav */
  .nav{display:flex;gap:8px;padding:12px 20px 0;border-bottom:1px solid #21262d;}
  .nav button{padding:7px 16px;border-radius:999px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
  .nav button.active{background:#238636;color:#fff;}
  .nav button:not(.active){background:#21262d;color:#8b949e;}

  /* Month scroll */
  .month-scroll{display:flex;gap:6px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #21262d;}
  .month-scroll::-webkit-scrollbar{display:none;}
  .month-btn{flex:0 0 auto;padding:6px 12px;border-radius:8px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;font-size:12px;transition:all .15s;text-align:center;}
  .month-btn.active{border-color:#238636;background:#0f2d1a;color:#56d364;font-weight:700;}
  .month-sub{display:block;font-size:10px;color:#57606a;margin-top:1px;}

  /* Day list */
  .day-list{padding:12px 16px 100px;}
  .month-title{font-size:16px;font-weight:700;color:#56d364;margin-bottom:10px;padding:0 4px;}
  .day-item{display:flex;align-items:center;gap:12px;padding:11px 12px;margin-bottom:6px;border-radius:10px;background:#161b22;border:1px solid #21262d;cursor:pointer;transition:all .15s;user-select:none;}
  .day-item.done{background:#0f2d1a;border-color:#238636;}
  .day-item:active{transform:scale(0.98);}
  .checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #30363d;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;transition:all .15s;}
  .day-item.done .checkbox{border-color:#238636;background:#238636;color:#fff;}
  .day-meta{font-size:11px;color:#57606a;margin-bottom:2px;}
  .day-text{font-size:13px;color:#c9d1d9;transition:all .15s;}
  .day-item.done .day-text{text-decoration:line-through;color:#56d364;opacity:.7;}
  .day-caps{font-size:11px;color:#57606a;flex-shrink:0;}

  /* Stats */
  .stats-wrap{padding:16px;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .stat-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px;text-align:center;}
  .stat-icon{font-size:22px;margin-bottom:4px;}
  .stat-val{font-size:22px;font-weight:700;color:#56d364;}
  .stat-label{font-size:11px;color:#8b949e;}
  .month-stats-title{font-size:14px;font-weight:700;color:#c9d1d9;margin-bottom:10px;}
  .mstat{margin-bottom:10px;}
  .mstat-row{display:flex;justify-content:space-between;font-size:12px;color:#8b949e;margin-bottom:3px;}
  .mstat-track{height:5px;background:#21262d;border-radius:99px;}
  .mstat-fill{height:100%;background:#2ea043;border-radius:99px;}
  .reset-btn{margin-top:20px;width:100%;padding:12px;border-radius:10px;border:1px solid #da3633;background:transparent;color:#f85149;cursor:pointer;font-size:13px;font-family:'Georgia',serif;}

  /* Install banner */
  .install-banner{position:fixed;bottom:0;left:0;right:0;background:#1c2128;border-top:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:200;}
  .install-banner p{font-size:12px;color:#8b949e;line-height:1.4;}
  .install-banner strong{color:#c9d1d9;}
  .install-btn{flex-shrink:0;padding:8px 14px;border-radius:8px;border:none;background:#238636;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
  .install-close{flex-shrink:0;background:transparent;border:none;color:#57606a;font-size:18px;cursor:pointer;padding:4px;}
  .hidden{display:none!important;}
</style>
</head>
<body>

<div class="header">
  <h1>📖 Biblia en un Año</h1>
  <p>Plan canónico · Empieza 18 de abril, 2026</p>
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="pDays">0 / 365 días</span>
      <span id="pChaps">0 capítulos · 0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
  </div>
</div>

<div class="nav">
  <button class="active" id="btnMonth" onclick="setView('month')">📅 Por mes</button>
  <button id="btnStats" onclick="setView('stats')">📊 Estadísticas</button>
</div>

<div id="viewMonth">
  <div class="month-scroll" id="monthScroll"></div>
  <div class="day-list">
    <div class="month-title" id="monthTitle"></div>
    <div id="dayList"></div>
  </div>
</div>

<div id="viewStats" class="hidden">
  <div class="stats-wrap">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val" id="sDays">0</div><div class="stat-label">Días completados</div></div>
      <div class="stat-card"><div class="stat-icon">📖</div><div class="stat-val" id="sChaps">0</div><div class="stat-label">Capítulos leídos</div></div>
      <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-val" id="sLeft">365</div><div class="stat-label">Días restantes</div></div>
      <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-val" id="sPct">0%</div><div class="stat-label">Progreso</div></div>
    </div>
    <div class="month-stats-title">Progreso por mes</div>
    <div id="monthStats"></div>
    <button class="reset-btn" onclick="resetProgress()">Reiniciar progreso</button>
  </div>
</div>

<!-- Install banner -->
<div class="install-banner" id="installBanner">
  <p><strong>¿Agregar al inicio?</strong><br>Instalá esta app en tu celu para usarla sin internet.</p>
  <button class="install-btn" id="installBtn" onclick="installApp()">Instalar</button>
  <button class="install-close" onclick="closeBanner()">✕</button>
</div>

<script>
const BOOKS = [
  ["Génesis",50],["Éxodo",40],["Levítico",27],["Números",36],
  ["Deuteronomio",34],["Josué",24],["Jueces",21],["Rut",4],
  ["1 Samuel",31],["2 Samuel",24],["1 Reyes",22],["2 Reyes",25],
  ["1 Crónicas",29],["2 Crónicas",36],["Esdras",10],["Nehemías",13],
  ["Ester",10],["Job",42],["Salmos",150],["Proverbios",31],
  ["Eclesiastés",12],["Cantares",8],["Isaías",66],["Jeremías",52],
  ["Lamentaciones",5],["Ezequiel",48],["Daniel",12],["Oseas",14],
  ["Joel",3],["Amós",9],["Abdías",1],["Jonás",4],["Miqueas",7],
  ["Nahúm",3],["Habacuc",3],["Sofonías",3],["Hageo",2],
  ["Zacarías",14],["Malaquías",4],
  ["Mateo",28],["Marcos",16],["Lucas",24],["Juan",21],
  ["Hechos",28],["Romanos",16],["1 Corintios",16],["2 Corintios",13],
  ["Gálatas",6],["Efesios",6],["Filipenses",4],["Colosenses",4],
  ["1 Tesalonicenses",5],["2 Tesalonicenses",3],["1 Timoteo",6],
  ["2 Timoteo",4],["Tito",3],["Filemón",1],["Hebreos",13],
  ["Santiago",5],["1 Pedro",5],["2 Pedro",3],["1 Juan",5],
  ["2 Juan",1],["3 Juan",1],["Judas",1],["Apocalipsis",22],
];

const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
// Plan starts April 18 = day index 107 of the year (0-indexed: Jan=0..31, Feb=32..59, Mar=60..90, Apr=91..)
// But we just number days 1-365 starting from April 18.
// Month display: we show months of the year but only starting from April (month 3)
// Let's map: day 0 = April 18, day 13 = April 30 (13 days), day 14 = May 1...
// Remaining April days: 30-18+1 = 13 days (Apr 18-30)
// Then full months May-Dec, then Jan-Mar next year, then Apr 1-17
const MONTH_PLAN = [
  {name:"Abril 2026", days:13},
  {name:"Mayo 2026", days:31},
  {name:"Junio 2026", days:30},
  {name:"Julio 2026", days:31},
  {name:"Agosto 2026", days:31},
  {name:"Septiembre 2026", days:30},
  {name:"Octubre 2026", days:31},
  {name:"Noviembre 2026", days:30},
  {name:"Diciembre 2026", days:31},
  {name:"Enero 2027", days:31},
  {name:"Febrero 2027", days:28},
  {name:"Marzo 2027", days:31},
  {name:"Abril 2027", days:17},
];

// Build flat chapter list
const ALL_CHAPTERS = [];
for(const [book,count] of BOOKS){
  for(let c=1;c<=count;c++) ALL_CHAPTERS.push({book,chapter:c});
}

// Build plan: 365 days
function buildPlan(){
  const total=ALL_CHAPTERS.length; const days=365;
  const base=Math.floor(total/days); const extra=total%days;
  const plan=[]; let idx=0;
  for(let d=0;d<days;d++){
    const cnt=base+(d<extra?1:0);
    plan.push(ALL_CHAPTERS.slice(idx,idx+cnt));
    idx+=cnt;
  }
  return plan;
}
const PLAN=buildPlan();

// Month ranges
const MONTH_RANGES=[];
let _start=0;
for(const m of MONTH_PLAN){
  MONTH_RANGES.push([_start,_start+m.days-1]);
  _start+=m.days;
}

const STORAGE_KEY="biblia_dy_2026";
let completed={};
try{const s=localStorage.getItem(STORAGE_KEY);if(s)completed=JSON.parse(s);}catch{}

let activeMonth=0;
let currentView="month";

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(completed));}catch{}}

function totalDone(){return Object.keys(completed).length;}
function totalChaps(){
  let c=0;
  for(const k of Object.keys(completed)) c+=PLAN[parseInt(k)]?.length||0;
  return c;
}

function formatReading(readings){
  const grouped=[];
  for(const r of readings){
    const last=grouped[grouped.length-1];
    if(last&&last.book===r.book) last.end=r.chapter;
    else grouped.push({book:r.book,start:r.chapter,end:r.chapter});
  }
  return grouped.map(g=>g.start===g.end?`${g.book} ${g.start}`:`${g.book} ${g.start}–${g.end}`).join(", ");
}

function updateHeader(){
  const done=totalDone(); const chaps=totalChaps();
  const pct=Math.round((done/365)*100);
  document.getElementById("pDays").textContent=`${done} / 365 días`;
  document.getElementById("pChaps").textContent=`${chaps} capítulos · ${pct}%`;
  document.getElementById("pFill").style.width=pct+"%";
}

function renderMonthScroll(){
  const el=document.getElementById("monthScroll");
  el.innerHTML="";
  MONTH_PLAN.forEach((m,i)=>{
    const [s,e]=MONTH_RANGES[i];
    const total=e-s+1;
    const done=Array.from({length:total},(_,k)=>s+k).filter(d=>completed[d]).length;
    const btn=document.createElement("button");
    btn.className="month-btn"+(i===activeMonth?" active":"");
    btn.innerHTML=`${done===total&&total>0?"✅ ":""}${m.name}<span class="month-sub">${done}/${total}</span>`;
    btn.onclick=()=>{activeMonth=i;renderAll();};
    el.appendChild(btn);
  });
  // scroll active into view
  const active=el.querySelector(".active");
  if(active) active.scrollIntoView({inline:"center",behavior:"smooth"});
}

function renderDayList(){
  const [s,e]=MONTH_RANGES[activeMonth];
  document.getElementById("monthTitle").textContent=MONTH_PLAN[activeMonth].name;
  const el=document.getElementById("dayList");
  el.innerHTML="";
  for(let i=s;i<=e;i++){
    const done=!!completed[i];
    const readings=PLAN[i];
    const label=formatReading(readings);
    const item=document.createElement("div");
    item.className="day-item"+(done?" done":"");
    item.innerHTML=`
      <div class="checkbox">${done?"✓":""}</div>
      <div style="flex:1">
        <div class="day-meta">Día ${i+1}</div>
        <div class="day-text">${label}</div>
      </div>
      <div class="day-caps">${readings.length} cap.</div>`;
    item.onclick=()=>{
      if(completed[i]) delete completed[i];
      else completed[i]=true;
      save(); renderAll();
    };
    el.appendChild(item);
  }
}

function renderStats(){
  const done=totalDone(); const chaps=totalChaps();
  const pct=Math.round((done/365)*100);
  document.getElementById("sDays").textContent=done;
  document.getElementById("sChaps").textContent=chaps;
  document.getElementById("sLeft").textContent=365-done;
  document.getElementById("sPct").textContent=pct+"%";

  const el=document.getElementById("monthStats");
  el.innerHTML="";
  MONTH_PLAN.forEach((m,i)=>{
    const [s,e]=MONTH_RANGES[i];
    const total=e-s+1;
    const mDone=Array.from({length:total},(_,k)=>s+k).filter(d=>completed[d]).length;
    const p=Math.round((mDone/total)*100);
    el.innerHTML+=`<div class="mstat">
      <div class="mstat-row"><span>${m.name}</span><span>${mDone}/${total} · ${p}%</span></div>
      <div class="mstat-track"><div class="mstat-fill" style="width:${p}%"></div></div>
    </div>`;
  });
}

function renderAll(){
  updateHeader();
  if(currentView==="month"){
    renderMonthScroll();
    renderDayList();
  } else {
    renderStats();
  }
}

function setView(v){
  currentView=v;
  document.getElementById("viewMonth").classList.toggle("hidden",v!=="month");
  document.getElementById("viewStats").classList.toggle("hidden",v!=="stats");
  document.getElementById("btnMonth").classList.toggle("active",v==="month");
  document.getElementById("btnStats").classList.toggle("active",v==="stats");
  renderAll();
}

function resetProgress(){
  if(confirm("¿Reiniciar todo el progreso?")){ completed={}; save(); renderAll(); }
}

// PWA install
let deferredPrompt=null;
const banner=document.getElementById("installBanner");

// Check if already installed or banner dismissed
if(localStorage.getItem("installDismissed")||window.matchMedia("(display-mode: standalone)").matches){
  banner.classList.add("hidden");
}

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault(); deferredPrompt=e;
  if(!localStorage.getItem("installDismissed")) banner.classList.remove("hidden");
});

function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{deferredPrompt=null;banner.classList.add("hidden");});
  } else {
    // iOS instructions
    alert("En iPhone/iPad:\n1. Abrí esta página en Safari\n2. Tocá el botón de compartir (□↑)\n3. Seleccioná \"Agregar a pantalla de inicio\"\n\n¡Y listo! Aparece como una app en tu celu.");
    closeBanner();
  }
}

function closeBanner(){
  banner.classList.add("hidden");
  localStorage.setItem("installDismissed","1");
}

// Initial render
renderAll();
 function getHoy(){
  return new Date().toISOString().split("T")[0];
}

function updateStreak(){
  let streak=parseInt(localStorage.getItem("streak")||"0");
  let lastDay=localStorage.getItem("lastDay");
  let hoy=getHoy();

  if(lastDay!==hoy){
    let ayer=new Date();
    ayer.setDate(ayer.getDate()-1);
    ayer=ayer.toISOString().split("T")[0];

    if(lastDay===ayer){streak++;}else{streak=1;}

    localStorage.setItem("streak",streak);
    localStorage.setItem("lastDay",hoy);
  }

  // mostrar en header
  let el=document.getElementById("streak");
  if(!el){
    const div=document.createElement("div");
    div.id="streak";
    div.style.fontSize="12px";
    div.style.color="#56d364";
    div.style.marginTop="6px";
    document.querySelector(".header").appendChild(div);
    el=div;
  }

  el.textContent="🔥 Racha: "+streak+" días";
}
</script>
</body>
</html>
